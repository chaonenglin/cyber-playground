<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>赛博飞镖 · 蒙眼乱扔</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100svh;
    background: linear-gradient(135deg, #0d0d14, #1a0d1a, #0d1117);
    font-family: system-ui, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    touch-action: manipulation;
    overflow-x: hidden;
  }
  .container {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  h1 {
    color: rgba(255,255,255,.7);
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: .25em;
    margin-bottom: .3rem;
  }
  .sub {
    color: rgba(255,255,255,.2);
    font-size: .75rem;
    margin-bottom: 1.5rem;
  }

  .board-wrap {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 0 auto 1.5rem;
    cursor: pointer;
    touch-action: manipulation;
  }

  .board {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    background: radial-gradient(circle at 45% 40%, #1a1a2e, #0a0a14);
    border: 3px solid rgba(255,255,255,.06);
    box-shadow:
      0 0 50px rgba(255,100,100,.03),
      0 0 100px rgba(255,100,100,.02),
      inset 0 0 60px rgba(0,0,0,.3);
    overflow: hidden;
    transition: transform .15s;
  }
  .board:active {
    transform: scale(.97);
  }

  /* 靶环 */
  .ring {
    position: absolute;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .r-bull   { width: 20px; height: 20px; background: radial-gradient(circle, #ff4444, #cc0000); box-shadow: 0 0 15px rgba(255,50,50,.3); z-index: 6; }
  .r-inner  { width: 60px; height: 60px; border: 2px solid rgba(255,255,255,.08); z-index: 5; }
  .r-mid    { width: 120px; height: 120px; border: 2px solid rgba(255,255,255,.05); z-index: 4; }
  .r-outer  { width: 200px; height: 200px; border: 2px solid rgba(255,255,255,.04); z-index: 3; }
  .r-edge   { width: 280px; height: 280px; border: 2px solid rgba(255,255,255,.02); z-index: 2; }

  /* 靶心分隔线 */
  .crosshair {
    position: absolute;
    pointer-events: none;
    z-index: 3;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,.02);
  }
  .crosshair::before {
    width: 1px;
    height: 100%;
    left: 50%;
    top: 0;
  }
  .crosshair::after {
    width: 100%;
    height: 1px;
    top: 50%;
    left: 0;
  }

  /* 飞镖 */
  .dart {
    position: absolute;
    font-size: 1.6rem;
    z-index: 10;
    pointer-events: none;
    transition: all .6s cubic-bezier(.1,.8,.3,1);
    opacity: 0;
    transform: translate(-50%, -50%) rotate(0deg);
  }
  .dart.show {
    opacity: 1;
  }
  .dart.stuck {
    animation: dartWobble .3s ease;
  }
  @keyframes dartWobble {
    0% { transform: translate(-50%, -50%) rotate(-2deg); }
    25% { transform: translate(-50%, -50%) rotate(3deg); }
    50% { transform: translate(-50%, -50%) rotate(-1deg); }
    75% { transform: translate(-50%, -50%) rotate(1deg); }
    100% { transform: translate(-50%, -50%) rotate(0deg); }
  }

  /* 飞镖飞行轨迹 */
  .dart-fly {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 100;
    transition: all .4s cubic-bezier(.25,.1,.25,1);
    opacity: 0;
  }

  .result-box {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    padding: 0 10px;
  }
  .result-text {
    color: rgba(255,255,255,.5);
    font-size: .9rem;
    line-height: 1.5;
    transition: all .3s;
  }
  .result-text.bull { color: #ff6b6b; font-size: 1.1rem; font-weight: 600; text-shadow: 0 0 20px rgba(255,50,50,.15); }
  .result-text.good { color: #69db7c; font-size: 1rem; }
  .result-text.ok   { color: rgba(255,255,255,.6); }
  .result-text.miss { color: rgba(255,255,255,.25); font-style: italic; }
  .result-text.fail { color: #ffa94d; }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: .5rem;
  }
  .btn {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.7);
    padding: 12px 32px;
    border-radius: 30px;
    cursor: pointer;
    font-size: .9rem;
    transition: all .2s;
    touch-action: manipulation;
    font-family: inherit;
  }
  .btn:hover {
    background: rgba(255,100,100,.08);
    border-color: rgba(255,100,100,.15);
    color: #ff6b6b;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary {
    background: rgba(255,100,100,.06);
    border-color: rgba(255,100,100,.12);
    color: #ff6b6b;
    font-size: 1rem;
    padding: 14px 44px;
  }
  .btn-primary:hover {
    background: rgba(255,100,100,.1);
    box-shadow: 0 0 40px rgba(255,50,50,.04);
  }
  .btn-home {
    border-color: rgba(255,215,0,.15);
    color: rgba(255,215,0,.5);
    padding: 8px 20px;
    font-size: .8rem;
  }
  .btn-home:hover {
    color: rgba(255,215,0,.7);
    border-color: rgba(255,215,0,.2);
  }

  .stats-line {
    color: rgba(255,255,255,.12);
    font-size: .7rem;
    letter-spacing: .05em;
  }
  .stats-line span { color: rgba(255,255,255,.3); }

  .footer {
    color: rgba(255,255,255,.08);
    font-size: .65rem;
    margin-top: 1.5rem;
  }

  .history-box {
    margin-top: .8rem;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    min-height: 28px;
  }
  .history-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .6rem;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.04);
    animation: dotPop .3s ease;
  }
  @keyframes dotPop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .history-dot.bull { background: rgba(255,50,50,.15); border-color: rgba(255,50,50,.2); }
  .history-dot.hit  { background: rgba(100,255,100,.08); border-color: rgba(100,255,100,.1); }
  .history-dot.ok   { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.06); }
  .history-dot.miss { background: rgba(255,255,255,.02); border-color: rgba(255,255,255,.03); opacity: .4; }

  @media (max-width: 480px) {
    .board-wrap { width: 250px; height: 250px; }
    .r-bull { width: 16px; height: 16px; }
    .r-inner { width: 50px; height: 50px; }
    .r-mid { width: 100px; height: 100px; }
    .r-outer { width: 170px; height: 170px; }
    .r-edge { width: 235px; height: 235px; }
    .dart { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎯 赛博飞镖</h1>
  <div class="sub">蒙眼扔 · 扎哪算哪 · 扎到自己概不负责</div>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board">
      <div class="crosshair"></div>
      <div class="ring r-edge"></div>
      <div class="ring r-outer"></div>
      <div class="ring r-mid"></div>
      <div class="ring r-inner"></div>
      <div class="ring r-bull"></div>
      <div class="dart" id="dart">🎯</div>
    </div>
  </div>

  <div class="result-box">
    <div class="result-text" id="resultText">点击靶子或按按钮扔飞镖</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="throwDart()">🎯 扔飞镖</button>
    <button class="btn btn-home" onclick="location.href='index.html'">🏠 主页</button>
  </div>

  <div class="stats-line">
    已扔 <span id="throwCount">0</span> 镖 ·
    命中 <span id="hitCount">0</span> ·
    十环 <span id="bullCount">0</span>
  </div>

  <div class="history-box" id="historyBox"></div>

  <div class="footer">空格扔飞镖 · 蒙眼乱扔更准（并不）</div>
</div>

<script>
// ====== 结果库 ======
const results = {
  bullseye: [
    '🎯 十环！！！全场沸腾！你是传说中的小李飞刀！',
    '🎯 正中靶心！飞镖协会向你发出了邀请',
    '🎯 完美！这镖值一个亿！',
    '🎯 靶心都被你扎穿了，赔钱！',
    '🎯 闭着眼睛扔的？你管这叫蒙眼？',
    '🎯 裁判举起10分牌！等等这里没裁判',
    '🎯 这一镖堪称艺术品，建议裱起来',
  ],
  inner: [
    '💪 内环！高手过招，你算一个',
    '💪 不错嘛，练过？哦没练过，那挺厉害的',
    '💪 内环！可以去天桥底下摆摊了',
    '💪 有点东西，这一镖值一杯奶茶',
    '💪 稳！除了手有点抖，其他都很好',
    '💪 内环！离封神就差那么一点点了',
  ],
  mid: [
    '👌 中环，还行，不算丢人',
    '👌 普普通通，符合你对人类能力的预期',
    '👌 中间偏上？中间偏下？反正中间',
    '👌 中规中矩，就像你的人生一样平稳',
    '👌 还行吧，至少没脱靶，知足常乐',
    '👌 这个成绩吧……也就比你期末考试好点',
  ],
  outer: [
    '😬 外环，擦了个边，算你上了靶',
    '😬 勉强及格，体育老师流下了欣慰的泪水',
    '😬 上了靶！虽然是外环但也是上了！',
    '😬 你确定你瞄准了？哦你没瞄准，那没事了',
    '😬 把靶放大十倍你就是冠军',
    '😬 外环！三分天注定，七分靠打……靠运气',
  ],
  edge: [
    '😰 擦边球！差一毫米就脱靶了',
    '😰 裁判商量了半天，决定给你1环',
    '😰 你确定你不是在扔回旋镖？',
    '😰 这么小的靶心确实不太适合你……',
    '😰 边缘OB，说的就是你这一镖',
  ],
  miss: [
    '💨 飞镖飞向了远方……远方是哪里？没人知道',
    '💨 脱靶了！扎在了墙上！墙上有个洞！',
    '💨 完美避开所有靶环，这也是一种天赋',
    '💨 飞镖表示不想上靶，它有它的想法',
    '💨 脱靶！隔壁靶位的大爷笑了',
    '💨 你扔的太歪了，飞镖拐了个弯飞走了',
    '💨 这镖直接扔到了次元壁的另一边',
    '💨 脱靶！建议换个运动，比如戳泡泡',
  ],
  self: [
    '🤕 你扎到了自己的脚！！！疼！！！',
    '🤕 飞镖反弹回来扎到了自己，经典操作',
    '🤕 命中自己！这也在你的计算之中吗？',
    '🤕 你的手被扎了……建议去看一下',
    '🤕 自扎！痛并快乐着（主要是痛）',
    '🤕 没扎到靶，扎到了自己，0分但勇气可嘉',
  ],
  friend: [
    '👻 你扎到了旁边围观的路人！快跑！',
    '👻 飞镖扎到了裁判！裁判给了你一个零分',
    '👻 一只路过的小鸟被你的飞镖吓飞了',
    '👻 飞镖扎在了你朋友的头上……朋友没了',
    '👻 你的飞镖扎到了上一个飞镖！双杀！',
  ],
};

// ====== 状态 ======
let stats = { total: 0, hits: 0, bulls: 0 };
let history = [];
let isThrowing = false;

// ====== 核心 ======
function throwDart() {
  if (isThrowing) return;
  isThrowing = true;

  const dart = document.getElementById('dart');
  const board = document.getElementById('board');
  const result = document.getElementById('resultText');
  const boardWrap = document.getElementById('boardWrap');

  // 重置飞镖位置到中央下方
  dart.className = 'dart';
  dart.style.opacity = '0';

  // 随机决定落点
  const angle = Math.random() * Math.PI * 2;
  // 半径分布：偏向边缘一些更有趣
  let r;
  const roll = Math.random();
  if (roll < 0.03) r = Math.random() * 0.06;       // 3% 靶心
  else if (roll < 0.12) r = 0.06 + Math.random() * 0.14; // 9% 内环
  else if (roll < 0.30) r = 0.2 + Math.random() * 0.2;   // 18% 中环
  else if (roll < 0.55) r = 0.4 + Math.random() * 0.2;   // 25% 外环
  else if (roll < 0.75) r = 0.6 + Math.random() * 0.15;  // 20% 边缘
  else if (roll < 0.92) r = 0.75 + Math.random() * 0.3;  // 17% 脱靶（偏外）
  else if (roll < 0.97) r = 1.0 + Math.random() * 0.4;   // 5% 彻底脱靶
  else if (roll < 0.99) return selfHit();                 // 2% 扎到自己
  else return friendHit();                                 // 1% 扎到路人

  // 归一化到靶面坐标（-1 ~ 1）
  const x = Math.cos(angle) * r;
  const y = Math.sin(angle) * r;

  // 飞镖动画：从底部飞入
  const rect = boardWrap.getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.bottom + 20;

  const dartFly = document.createElement('div');
  dartFly.className = 'dart-fly';
  dartFly.textContent = '🎯';
  dartFly.style.left = startX + 'px';
  dartFly.style.top = startY + 'px';
  dartFly.style.opacity = '1';
  document.body.appendChild(dartFly);

  // 目标位置
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  const radius = rect.width / 2;
  const targetX = centerX + x * radius;
  const targetY = centerY + y * radius;

  // 飞鸟飞行
  requestAnimationFrame(() => {
    dartFly.style.left = targetX + 'px';
    dartFly.style.top = targetY + 'px';
    dartFly.style.transform = 'scale(.6)';
    dartFly.style.opacity = '.6';
  });

  // 落地
  setTimeout(() => {
    dartFly.remove();

    // 镖插在靶上
    dart.style.left = (50 + x * 42) + '%';
    dart.style.top = (50 + y * 42) + '%';
    dart.style.opacity = '1';
    dart.className = 'dart show stuck';
    dart.style.transform = 'translate(-50%, -50%) rotate(' + (Math.random() * 10 - 5) + 'deg)';

    // 判断结果
    const absR = Math.sqrt(x*x + y*y);
    let zone, pool;
    if (absR <= 0.06) { zone = 'bull'; pool = results.bullseye; stats.bulls++; }
    else if (absR <= 0.2) { zone = 'hit'; pool = results.inner; }
    else if (absR <= 0.4) { zone = 'hit'; pool = results.mid; }
    else if (absR <= 0.6) { zone = 'ok'; pool = results.outer; }
    else if (absR <= 0.75) { zone = 'ok'; pool = results.edge; }
    else { zone = 'miss'; pool = results.miss; }

    if (zone !== 'miss' && zone !== 'ok') stats.hits++;

    const msg = pool[Math.floor(Math.random() * pool.length)];

    // 显示结果
    result.textContent = msg;
    result.className = 'result-text';
    if (zone === 'bull') result.classList.add('bull');
    else if (zone === 'hit') result.classList.add('good');
    else if (zone === 'ok') result.classList.add('ok');
    else result.classList.add('miss');

    stats.total++;
    updateStats();

    // 记录
    history.push(zone);
    renderHistory();

    isThrowing = false;
  }, 500);
}

function selfHit() {
  const result = document.getElementById('resultText');
  const msg = results.self[Math.floor(Math.random() * results.self.length)];
  result.textContent = '🤕 ' + msg;
  result.className = 'result-text fail';

  stats.total++;
  updateStats();
  history.push('self');
  renderHistory();
  isThrowing = false;
}

function friendHit() {
  const result = document.getElementById('resultText');
  const msg = results.friend[Math.floor(Math.random() * results.friend.length)];
  result.textContent = '👻 ' + msg;
  result.className = 'result-text fail';

  stats.total++;
  updateStats();
  history.push('friend');
  renderHistory();
  isThrowing = false;
}

function updateStats() {
  document.getElementById('throwCount').textContent = stats.total;
  document.getElementById('hitCount').textContent = stats.hits;
  document.getElementById('bullCount').textContent = stats.bulls;
}

function renderHistory() {
  const box = document.getElementById('historyBox');
  box.innerHTML = history.slice(-30).map(z => {
    let cls = 'history-dot';
    if (z === 'bull') cls += ' bull';
    else if (z === 'hit') cls += ' hit';
    else if (z === 'ok' || z === 'miss') cls += ' miss';
    else cls += ' miss';
    const icon = z === 'bull' ? '🎯' : z === 'self' ? '🤕' : z === 'friend' ? '👻' : '';
    return `<div class="${cls}">${icon}</div>`;
  }).join('');
}

// ====== 键盘 ======
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); throwDart(); }
});

// ====== 点击靶子 ======
document.getElementById('board').addEventListener('click', throwDart);

// ====== 初始化 ======
</script>
</body>
</html>
