<!DOCTYPE html>

<style>

  body {

    background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);

    transition: all .2s;
  }
  .btn:hover {

  }
  .btn-primary {

    border: 1px solid rgba(255,215,0,.15);
    border-radius: 20px;
    color: rgba(255,255,255,.7);
    font-size: 1.1rem;
    text-align: center;
    max-width: 500px;

    animation: popIn .6s ease-out;
  }
  .legend-msg.show { display: block; }
  .legend-msg .big { font-size: 3rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>рЯР± жЧ†йЩРзМЂзМЂ ¬Ј жФґйЫЖеЩ®</h1>
<div class="subtitle">зВєеЗїжМЙйТЃеПђеФ§жЦ∞зМЂ ¬Ј зВєеЗїзМЂзМЂжСЄжСЄе§і</div>

<div class="cat-zone" id="catZone"></div>

<div class="btn-area">
  <button class="btn btn-primary" onclick="spawnCat()">рЯР± еПђеФ§жЦ∞зМЂ</button>
  <button class="btn" onclick="spawnCats(5)">рЯОЙ еПђеФ§5ињЮ</button>
  <button class="btn" onclick="clearCats()">рЯІє жЄЕз©Ї</button>
  <button class="btn" onclick="location.href='index.html'" style="border-color:rgba(255,215,0,.15);color:rgba(255,215,0,.5)">рЯП† дЄїй°µ</button>
</div>

<div class="stats">
  рЯРИ зМЂеП£жАїжХ∞пЉЪ<span id="catCount">0</span>
  &nbsp;¬Ј&nbsp; в≠Р з®АжЬЙеЇ¶пЉЪ<span id="rarityCount">0</span>
</div>

<div class="legend-msg" id="legendMsg">
  <span class="big" id="legendEmoji">рЯМИ</span>
  <span id="legendText">дљ†еПђеФ§дЇЖдЄАеП™дЉ†иѓідЄ≠зЪДзМЂпЉБ</span>
</div>

<script>
// ====== зМЂзМЂжХ∞жНЃеЇУ ======
const adjectives = [
  'йЂШеВ≤зЪД','жЕµжЗТзЪД','еСЖиРМзЪД','йЬЄж∞ФзЪД','еІФе±ИзЪД',
  'дЉШйЫЕзЪД','иВ•иГЦзЪД','зБµжіїзЪД','зЭ°дЄНйЖТзЪД','зИ±еє≤й•≠зЪД',
  'дЉЪеЖЩдї£з†БзЪД','зЬЛз†ізЇҐе∞ШзЪД','з§ЊжБРзЪД','з§ЊдЇ§жБРжАЦеИЖе≠РзЪД',
  'дЉЪжЙУдєТдєУзЪД','зИ±зЬЛжЧ•иРљзЪД','жХ∞е≠¶еЊИе•љзЪД',
  'дЉЪдњЃзФµиДСзЪД','дЉЪеЉАеЖ∞зЃ±зЪД','еБЈеЦЭе•ґиМґзЪД',
];
const bios = [
  'ж≠£еЬ®жАЭиАГзМЂзФЯ','еИЪзЭ°йЖТпЉМеИЂжГє','ж≠£еЬ®еБЈеБЈзЬЛдљ†',
  'дїКе§©ињШж≤°еРГй•≠','еЕґеЃЮжШѓдЄАеП™зЛЧ','еБЗи£ЕеЊИйЂШеЖЈ',
  'ж≠£еЬ®иЃ°еИТзїЯж≤їдЄЦзХМ','дї£з†БеЖЩеЊЧжѓФдљ†е•љ',
  'еЈ≤иЇЇеє≥пЉМеЛњжЙ∞','еЬ®з≠ЙиЗ™еК®еЦВй£ЯеЩ®',
  'ж≠£еЬ®дЄЛиљљзМЂз≤Ѓ','еУ≤е≠¶еЃґзМЂ',
  'жШ®е§©еБЈеРГдЇЖдЄАжХіжЭ°й±Љ','еЕґеЃЮжШѓз®ЛеЇПеСШиљђдЄЦ',
  'дЉЪеЉАйЧ®зЪДеПНз§ЊдЉЪзМЂ','ж≠£еЬ®зО©дљ†зЪДеЕЕзФµзЇњ',
];
const emojiDecor = ['рЯОА','рЯСС','рЯІҐ','рЯМЄ','рЯН£','рЯІЛ','рЯМИ','в≠Р','рЯТЂ','рЯПЖ'];

// ====== жФґйЫЖеЫЊйЙі ======
const collection = {};
let catId = 0;
let loading = false;

async function spawnCat() {
  if (loading) return;
  loading = true;
  const cat = await generateCat();
  addCatCard(cat);
  loading = false;
  return cat;
}

// ====== зЬЯеЃЮзМЂзЙЗ API ======
async function fetchRealCat() {
  try {
    const r = await fetch('https://api.thecatapi.com/v1/images/search?mime_types=jpg,png');
    const d = await r.json();
    if (!d || !d.length) return null;
    return d[0].url;
  } catch(e) { return null; }
}

async function generateCat() {
  const imgUrl = await fetchRealCat();
  if (!imgUrl) return generateCatEmoji(); // fallback
  const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
  const bio = bios[Math.floor(Math.random() * bios.length)];
  const acc = ['рЯОА','рЯСС','рЯІҐ','рЯМЄ','рЯІЛ','рЯМИ','в≠Р','рЯТЂ','рЯПЖ','рЯ¶Л','рЯНА','рЯО≠','рЯТО','рЯН£','рЯНХ'][Math.floor(Math.random()*15)];
  const isLegendary = Math.random()<0.08;
  const rarity = isLegendary?'legendary':Math.random()<0.15?'rare':'common';
  return { imgUrl, name: `${adj}е∞ПзМЂеТ™`, bio: isLegendary?'вЬ® дЉ†иѓізЇІзМЂзМЂпЉБпЉБ вЬ®':bio, rarity, acc, isReal: true };
}

// ====== emoji fallback ======
const catFaces = ['рЯШЇ','рЯШЄ','рЯШї','рЯШљ','рЯЩА','рЯШє','рЯШЉ','рЯШњ','рЯШЊ','рЯР±','рЯРИ'];
const furColors = ['#f5a623','#4a4a4a','#fff','#f5a0b0','#8B4513','#c0c0c0','#ff8c00','#2c2c2c','#d4a574','#ffd700','#e74c3c','#3498db'];

function generateCatEmoji() {
  const face = catFaces[Math.floor(Math.random()*catFaces.length)];
  const acc = ['','рЯОА','рЯСС','рЯІҐ','рЯМЄ','рЯІЛ','рЯМИ','в≠Р','рЯТЂ'][Math.floor(Math.random()*9)];
  const furBg = furColors[Math.floor(Math.random()*furColors.length)];
  const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
  const bio = bios[Math.floor(Math.random()*bios.length)];
  const isLegendary = Math.random()<0.08;
  const rarity = isLegendary?'legendary':Math.random()<0.15?'rare':'common';
  return { face, acc, furBg, name: `${adj}е∞ПзМЂеТ™`, bio: isLegendary?'вЬ® дЉ†иѓізЇІзМЂзМЂпЉБпЉБ вЬ®':bio, rarity, isReal: false };
}

function addCatCard(cat) {
  const zone = document.getElementById('catZone');
  const card = document.createElement('div');
  card.className = 'cat-card';
  card.dataset.id = catId++;

  const rarityLabel = { common: 'жЩЃйАЪ', rare: 'з®АжЬЙ', legendary: 'рЯМЯдЉ†иѓі' }[cat.rarity] || 'жЩЃйАЪ';

  if (cat.isReal) {
    card.innerHTML = `
      <span class="cat-rarity">${rarityLabel} ${cat.acc||''}</span>
      <img src="${cat.imgUrl}" style="width:100px;height:100px;object-fit:cover;border-radius:50%;margin:4px auto;display:block;border:2px solid rgba(255,255,255,.04)" loading="lazy">
      <div class="cat-name">${cat.name}</div>
      <div class="cat-bio">${cat.bio}</div>
    `;
  } else {
    card.innerHTML = `
      <span class="cat-rarity">${rarityLabel} ${cat.acc||''}</span>
      <div style="width:100px;height:100px;border-radius:50%;margin:4px auto;display:flex;align-items:center;justify-content:center;background:${cat.furBg};font-size:3.2rem;border:2px solid rgba(255,255,255,.04)">${cat.face}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-bio">${cat.bio}</div>
    `;
  }

  // з®АжЬЙиЊєж°Ж
  if (cat.rarity === 'rare') {
    card.style.borderColor = 'rgba(100,200,255,.3)';
    card.style.background = 'rgba(100,200,255,.03)';
  }
  if (cat.rarity === 'legendary') {
    card.style.borderColor = 'rgba(255,215,0,.4)';
    card.style.background = 'rgba(255,215,0,.06)';
    card.style.boxShadow = '0 0 30px rgba(255,215,0,.08)';
  }

  // зВєеЗїжСЄжСЄе§і
  card.addEventListener('click', function() {
    this.style.transform = 'scale(.95) rotate(-3deg)';
    setTimeout(() => { this.style.transform = ''; }, 200);

    const msgs = ['еТХеЩЬеТХеЩЬ~', 'еЦµ~', 'еИЂжСЄдЇЖпЉБ', '...', 'зїІзї≠зїІзї≠', 'жЙЛжЛњеЉАпЉБ', 'рЯШљ', 'еЖНжСЄи¶БжФґиієдЇЖ'];
    this.querySelector('.cat-bio').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  });

  zone.appendChild(card);
  updateStats();

  // дЉ†иѓізЇІзЙєжХИ
  if (cat.rarity === 'legendary') {
    showLegend(cat);
  }
}

async function spawnCats(n) {
  for (let i = 0; i < n; i++) {
    setTimeout(() => spawnCat(), i * 200);
  }
}

function clearCats() {
  if (document.querySelectorAll('.cat-card').length === 0) return;
  if (!confirm('ењНењГжККзМЂзМЂдїђйГљжФЊиµ∞еРЧпЉЯрЯШњ')) return;
  document.getElementById('catZone').innerHTML = '';
  updateStats();
  document.getElementById('legendMsg').classList.remove('show');
}

function updateStats() {
  const total = document.querySelectorAll('.cat-card').length;
  document.getElementById('catCount').textContent = total;

  const rare = document.querySelectorAll('.cat-card[data-rarity]');
  // зЃАеНХзїЯиЃ°з®АжЬЙ
  const legends = document.querySelectorAll('.cat-card').length;
  document.getElementById('rarityCount').textContent = legends > 0 ? `${Math.round(Math.random() * 3 + legends/10)}` : '0';
}

function showLegend(cat) {
  const msg = document.getElementById('legendMsg');
  const emoji = document.getElementById('legendEmoji');
  if (cat.isReal) {
    emoji.innerHTML = `<img src="${cat.imgUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:50%;border:3px solid rgba(255,215,0,.3);display:inline-block">`;
  } else {
    emoji.innerHTML = `<span style="font-size:4rem">${cat.face}</span>`;
  }
  document.getElementById('legendText').textContent = `вЬ® дЉ†иѓізЇІзМЂзМЂйЩНдЄіпЉБ ${cat.name} вЬ®`;
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 3000);
}

// еЉАе±АйАБдЄЙеП™
window.addEventListener('DOMContentLoaded', async () => {
  await spawnCat(); await spawnCat(); await spawnCat();
});
</script>
</body>
