<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>无限猫猫 · 赛博吸猫</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100svh;
    background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);
    font-family: system-ui, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    touch-action: manipulation;
  }
  h1 {
    color: rgba(255,255,255,.8);
    font-size: 1.4rem;
    letter-spacing: .2em;
    font-weight: 300;
    margin-bottom: .3rem;
  }
  .subtitle {
    color: rgba(255,255,255,.4);
    font-size: .8rem;
    margin-bottom: 1.5rem;
  }

  .cat-zone {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    max-width: 800px;
    min-height: 260px;
    padding: 1rem;
  }

  .cat-card {
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 20px;
    padding: 20px 16px 16px;
    width: 180px;
    text-align: center;
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
    position: relative;
  }
  .cat-card img {
    width: 140px !important;
    height: 140px !important;
  }
  .synthesis-panel{margin:1rem auto;max-width:480px;background:rgba(255,215,0,.02);border:1px solid rgba(255,215,0,.06);border-radius:16px;padding:1rem;text-align:center}
  .synth-title{color:rgba(255,215,0,.4);font-size:.75rem;letter-spacing:.15em;margin-bottom:.5rem}
  .synth-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .synth-btn{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.08);color:rgba(255,215,0,.4);padding:8px 18px;border-radius:20px;cursor:pointer;font-size:.75rem;font-family:inherit;transition:all .2s}
  .synth-btn:hover:not(:disabled){background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.15);color:rgba(255,215,0,.6)}
  .synth-btn:disabled{opacity:.3;cursor:not-allowed}
  .synth-btn.active{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.2);color:rgba(255,215,0,.6)}
  .cat-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,.3);
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0) rotate(-10deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .cat-emoji {
    font-size: 3.5rem;
    line-height: 1.2;
    margin-bottom: 6px;
    display: block;
  }
  .cat-name {
    font-size: .8rem;
    color: rgba(255,255,255,.7);
    font-weight: 500;
    margin-bottom: 2px;
  }
  .cat-bio {
    font-size: .65rem;
    color: rgba(255,255,255,.35);
    line-height: 1.3;
    margin-top: 4px;
  }
  .cat-rarity {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: .55rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.3);
  }

  .btn-area {
    display: flex;
    gap: 12px;
    margin-top: .5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.7);
    padding: 10px 28px;
    border-radius: 30px;
    cursor: pointer;
    font-size: .85rem;
    transition: all .2s;
  }
  .btn:hover {
    background: rgba(255,200,100,.1);
    border-color: rgba(255,200,100,.2);
    color: #ffd700;
  }
  .btn-primary {
    background: rgba(255,200,100,.1);
    border-color: rgba(255,200,100,.2);
    color: #ffd700;
  }
  .btn-primary:hover {
    background: rgba(255,200,100,.2);
    box-shadow: 0 0 30px rgba(255,200,100,.1);
  }

  .stats {
    color: rgba(255,255,255,.4);
    font-size: .8rem;
    margin: 1rem 0 .5rem;
    text-align: center;
  }
  .stats span { color: rgba(255,255,255,.6); }

  .legend-msg {
    margin-top: 2rem;
    padding: 1.5rem 2rem;
    background: linear-gradient(135deg, rgba(255,215,0,.05), rgba(255,200,100,.08));
    border: 1px solid rgba(255,215,0,.15);
    border-radius: 20px;
    color: rgba(255,255,255,.7);
    font-size: 1.1rem;
    text-align: center;
    max-width: 500px;
    display: none;
    animation: popIn .6s ease-out;
  }
  .legend-msg.show { display: block; }
  .legend-msg .big { font-size: 3rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>🐱 无限猫猫 · 收集器</h1>
<div class="subtitle">点击按钮召唤新猫 · 点击猫猫摸摸头</div>

<div class="cat-zone" id="catZone"></div>

<div class="btn-area">
  <button class="btn btn-primary" onclick="spawnCat()">🐱 召唤新猫</button>
  <button class="btn" onclick="spawnCats(5)">🎉 召唤5连</button>
  <button class="btn" onclick="clearCats()">🧹 清空</button>
  <button class="btn" onclick="location.href='index.html'" style="border-color:rgba(255,215,0,.15);color:rgba(255,215,0,.5)">🏠 主页</button>
</div>

<div class="stats">
  🐈 猫口总数：<span id="catCount">0</span>
  &nbsp;·&nbsp; ⭐ 稀有度：<span id="rarityCount">0</span>
</div>

<!-- 合成面板 -->
<div class="synthesis-panel" id="synthesisPanel">
  <div class="synth-title">🔮 合成（3张相同猫片 → 高级稀有度）</div>
  <div class="synth-btns">
    <button class="synth-btn" id="synthBtn" onclick="synthesize()" disabled>暂无可合成的猫</button>
  </div>
</div>

<div class="legend-msg" id="legendMsg">
  <span class="big" id="legendEmoji">🌈</span>
  <span id="legendText">你召唤了一只传说中的猫！</span>
</div>

<script>
// ====== 猫猫数据库 ======
const adjectives = [
  '高傲的','慵懒的','呆萌的','霸气的','委屈的',
  '优雅的','肥胖的','灵活的','睡不醒的','爱干饭的',
  '会写代码的','看破红尘的','社恐的','社交恐怖分子的',
  '会打乒乓的','爱看日落的','数学很好的',
  '会修电脑的','会开冰箱的','偷喝奶茶的',
];
const bios = [
  '正在思考猫生','刚睡醒，别惹','正在偷偷看你',
  '今天还没吃饭','其实是一只狗','假装很高冷',
  '正在计划统治世界','代码写得比你好',
  '已躺平，勿扰','在等自动喂食器',
  '正在下载猫粮','哲学家猫',
  '昨天偷吃了一整条鱼','其实是程序员转世',
  '会开门的反社会猫','正在玩你的充电线',
];
const emojiDecor = ['🎀','👑','🧢','🌸','🍣','🧋','🌈','⭐','💫','🏆'];

// ====== 收集图鉴 ======
const collection = {};
let catId = 0;
let loading = false;
function pick(a){return a[Math.floor(Math.random()*a.length)]}

async function spawnCat() {
  if (loading) return;
  loading = true;
  const cat = await generateCat();
  addCatCard(cat);
  loading = false;
  return cat;
}

// ====== 猫片库（按稀有度分文件夹） ======
const CAT_FOLDERS = {
  common: '猫的图片/普通/',
  rare: '猫的图片/稀有/',
  legendary: '猫的图片/传说/',
};
// 预先从文件夹加载文件名（运行时动态构建路径）
async function loadCatFromFolder(folder, rar) {
  // 直接用 fetch 无法枚举目录，所以构建完整路径数组
  const catFiles = {
    common: [
      'mmexport1776669143812.jpg','mmexport1776669178859.jpg','mmexport1776670204155.jpg','mmexport1776670659207.jpg',
      'mmexport1779009656955.jpg','mmexport1779010522122.jpg','mmexport1779010693154.jpg','mmexport1780401060812.jpg',
      'retouch_2026051919200607.jpg','wx_camera_1777004238069.jpg','wx_camera_1777198497125.jpg','wx_camera_1777782845864.jpg',
      'wx_camera_1778808814923.jpg','wx_camera_1778808851309.jpg','wx_camera_1778903358110.jpg','wx_camera_1779119661782.jpg',
      'wx_camera_1779189131685.jpg','wx_camera_1779189401321.jpg','wx_camera_1779275365521.jpg','wx_camera_1779331611916.jpg',
      'wx_camera_1779537120238.jpg','wx_camera_1779952364736.jpg','wx_camera_1780024354116.jpg','wx_camera_1780283309037.jpg',
      'wx_camera_1780283325734.jpg','wx_camera_1780456835045.jpg','wx_camera_1780459158292.jpg','wx_camera_1780459175389.jpg',
      'wx_camera_1780459245171.jpg',
    ],
    rare: [
      'IMG_20260422_155740.jpg','IMG_20260422_165209.jpg','IMG_20260424_144424.jpg','IMG_20260426_173110.jpg',
      'IMG_20260426_173111.jpg','IMG_20260427_203652.jpg','IMG_20260427_203943.jpg','IMG_20260428_084610.jpg',
      'IMG_20260428_114324.jpg','IMG_20260429_215553.jpg','IMG_20260429_215554.jpg','IMG_20260429_215625.jpg',
      'IMG_20260430213446965.jpeg','IMG_20260430231419134.jpeg','IMG_20260501161939908.jpeg','IMG_20260502162036820.jpeg',
      'IMG_20260503_182824.jpg','IMG_20260504_195808.jpg','IMG_20260504_215113.jpg','IMG_20260504_215118.jpg',
      'IMG_20260505_161719.jpg','IMG_20260516_094135.jpg','IMG_20260516_094137.jpg','IMG_20260516_101506.jpg',
      'IMG_20260518_233347.jpg','IMG_20260519_172406.jpg','IMG_20260520_122010.jpg','IMG_20260520_182337.jpg',
      'IMG_20260523_195816.jpg','IMG_20260523_195952.jpg','IMG_20260523_195956.jpg','IMG_20260524_121937.jpg',
      'IMG_20260524_121940.jpg','IMG_20260525_113426.jpg','IMG_20260525_113801.jpg','IMG_20260526_120620.jpg',
      'IMG_20260526_120623.jpg','IMG_20260529_201252.jpg','IMG_20260602_173602.jpg','IMG_20260602_173603.jpg',
      'IMG_20260602_190202.jpg','IMG_20260602_190228.jpg','IMG_20260602_190242.jpg','IMG_20260602_193156.jpg',
      'IMG_20260420_195445.jpg','IMG_20260422_165526.jpg','IMG_20260427_162634.jpg','IMG_20260528_190228.jpg',
      'IMG_20260528_190231.jpg','IMG_20260602_185544.jpg',
    ],
    legendary: [
      '26f964d6c766f5c0308cf1cc55f055df.jpg','IMG_20260407_164443.jpg','IMG_20260412_181733.jpg',
      'IMG_20260424_124426.jpg','IMG_20260430_141331.jpg','IMG_20260501_161937.jpg',
      'IMG_20260502_083844.jpg','IMG_20260602_185521.jpg',
    ],
  };
  const files = catFiles[rar] || catFiles.common;
  if (!files.length) return null;
  return CAT_FOLDERS[rar] + files[Math.floor(Math.random() * files.length)];
}

async function generateCat(rarity) {
  // 不指定稀有度则按概率随机
  if (!rarity) {
    const roll = Math.random();
    rarity = roll < 0.25 ? 'rare' : 'common';
  }
  // 从对应文件夹随机取一张
  let imgUrl = await loadCatFromFolder('', rarity);
  // fallback: 如果文件夹没图，走API
  if (!imgUrl) {
    try {
      const r = await fetch('https://api.thecatapi.com/v1/images/search?mime_types=jpg,png');
      const d = await r.json();
      if (d && d.length) imgUrl = d[0].url;
    } catch(e) {}
  }
  if (!imgUrl) return generateCatEmoji(rarity);
  const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
  const bio = bios[Math.floor(Math.random() * bios.length)];
  const acc = ['🎀','👑','🧢','🌸','🧋','🌈','⭐','💫','🏆','🦋','🍀','🎭','💎','🍣','🍕'][Math.floor(Math.random()*15)];
  const isLegendary = rarity === 'legendary';
  return { imgUrl, name: `${adj}小猫咪`, bio: isLegendary?'✨ 传说级猫猫！！ ✨':bio, rarity, acc, isReal: true };
}

// ====== emoji fallback ======
const catFaces = ['😺','😸','😻','😽','🙀','😹','😼','😿','😾','🐱','🐈'];
const furColors = ['#f5a623','#4a4a4a','#fff','#f5a0b0','#8B4513','#c0c0c0','#ff8c00','#2c2c2c','#d4a574','#ffd700','#e74c3c','#3498db'];

function generateCatEmoji(rarity) {
  const face = catFaces[Math.floor(Math.random()*catFaces.length)];
  const acc = ['','🎀','👑','🧢','🌸','🧋','🌈','⭐','💫'][Math.floor(Math.random()*9)];
  const furBg = furColors[Math.floor(Math.random()*furColors.length)];
  const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
  const bio = bios[Math.floor(Math.random()*bios.length)];
  if (!rarity) rarity = Math.random()<0.25?'rare':'common';
  const isLegendary = rarity === 'legendary';
  return { face, acc, furBg, name: `${adj}小猫咪`, bio: isLegendary?'✨ 传说级猫猫！！ ✨':bio, rarity, isReal: false };
}

function addCatCard(cat) {
  const zone = document.getElementById('catZone');
  const card = document.createElement('div');
  card.className = 'cat-card';
  card.dataset.id = catId++;

  const rarityLabel = { common: '普通', rare: '稀有', legendary: '🌟传说' }[cat.rarity] || '普通';

  if (cat.isReal) {
    card.innerHTML = `
      <span class="cat-rarity">${rarityLabel} ${cat.acc||''}</span>
      <img src="${cat.imgUrl}" style="width:140px;height:140px;object-fit:cover;border-radius:50%;margin:6px auto;display:block;border:3px solid rgba(255,255,255,.06)" loading="lazy">
      <div class="cat-name">${cat.name}</div>
      <div class="cat-bio">${cat.bio}</div>
    `;
  } else {
    card.innerHTML = `
      <span class="cat-rarity">${rarityLabel} ${cat.acc||''}</span>
      <div style="width:140px;height:140px;border-radius:50%;margin:6px auto;display:flex;align-items:center;justify-content:center;background:${cat.furBg};font-size:4.5rem;border:3px solid rgba(255,255,255,.06)">${cat.face}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-bio">${cat.bio}</div>
    `;
  }

  // 稀有边框
  if (cat.rarity === 'rare') {
    card.style.borderColor = 'rgba(100,200,255,.3)';
    card.style.background = 'rgba(100,200,255,.03)';
  }
  if (cat.rarity === 'legendary') {
    card.style.borderColor = 'rgba(255,215,0,.4)';
    card.style.background = 'rgba(255,215,0,.06)';
    card.style.boxShadow = '0 0 30px rgba(255,215,0,.08)';
  }

  // 点击摸摸头
  card.addEventListener('click', function() {
    this.style.transform = 'scale(.95) rotate(-3deg)';
    setTimeout(() => { this.style.transform = ''; }, 200);

    const msgs = ['咕噜咕噜~', '喵~', '别摸了！', '...', '继续继续', '手拿开！', '😽', '再摸要收费了'];
    this.querySelector('.cat-bio').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  });

  card.dataset.rarity = cat.rarity;
  if (cat.isReal) card.dataset.img = cat.imgUrl;
  zone.appendChild(card);
  // 标记重复数量
  markDuplicates();
  updateStats();

  // 传说级特效
  if (cat.rarity === 'legendary') {
    showLegend(cat);
  }
}

async function spawnCats(n) {
  for (let i = 0; i < n; i++) {
    setTimeout(() => spawnCat(), i * 200);
  }
}

function clearCats() {
  if (document.querySelectorAll('.cat-card').length === 0) return;
  if (!confirm('忍心把猫猫们都放走吗？😿')) return;
  document.getElementById('catZone').innerHTML = '';
  updateStats();
  document.getElementById('legendMsg').classList.remove('show');
}

function markDuplicates() {
  // 清除旧标记
  document.querySelectorAll('.dup-count').forEach(e=>e.remove());
  document.querySelectorAll('.cat-card').forEach(c=>c.style.outline='');
  // 按相同图片分组
  const groups = {};
  document.querySelectorAll('.cat-card[data-img]').forEach(c=>{
    const img = c.dataset.img;
    if (!groups[img]) groups[img] = [];
    groups[img].push(c);
  });
  // 有3+张相同图片的标记
  for (const [img, cards] of Object.entries(groups)) {
    if (cards.length >= 3) {
      cards.forEach(c => {
        c.style.outline = '2px solid rgba(255,215,0,.3)';
        const badge = document.createElement('div');
        badge.className = 'dup-count';
        badge.textContent = `×${cards.length}`;
        badge.style.cssText = 'position:absolute;bottom:6px;right:8px;background:rgba(255,215,0,.15);color:#ffd700;font-size:.65rem;padding:1px 6px;border-radius:8px;border:1px solid rgba(255,215,0,.2);z-index:5';
        c.appendChild(badge);
      });
      // 合成按钮显示可合成
      const btn = document.getElementById('synthBtn');
      btn.disabled = false;
      btn.textContent = `🔄 合成 (${cards[0].querySelector('.cat-name').textContent}×3 → 稀有)`;
      btn.dataset.targetImg = img;
    }
  }
}

function countByRarity(rar) {
  return document.querySelectorAll(`.cat-card[data-rarity="${rar}"]`).length;
}

function spawnParticles(rarity, rect) {
  const isLegend = rarity === 'legendary';
  const count = isLegend ? 60 : 25;
  const colors = isLegend
    ? ['#ffd700','#ff6b6b','#69db7c','#74b9ff','#a29bfe','#fff','#ffa94d']
    : ['#ffd700','#69db7c','#74b9ff','#fff'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:fixed;pointer-events:none;z-index:999;font-size:${isLegend?1.2:0.7}rem;left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;opacity:1`;
    p.textContent = isLegend ? pick(['✨','⭐','🌟','💫','🎉','🏆']) : pick(['✨','⭐','💫']);
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * (isLegend ? 200 : 100);
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const dur = 0.6 + Math.random() * (isLegend ? 0.8 : 0.4);
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px,${dy}px) scale(${isLegend?1.5:0.5})`, opacity: 0 }
    ], { duration: dur * 1000, easing: 'ease-out' }).onfinish = () => p.remove();
  }
}

function updateStats() {
  const total = document.querySelectorAll('.cat-card').length;
  document.getElementById('catCount').textContent = total;
  const l = countByRarity('legendary');
  const r = countByRarity('rare');
  const c = countByRarity('common');
  document.getElementById('rarityCount').textContent = `🌟${l} 💎${r} 📦${c}`;
  // 合成按钮状态在markDuplicates里维护
}

async function synthesize() {
  const btn = document.getElementById('synthBtn');
  const targetImg = btn.dataset.targetImg;
  if (!targetImg) return;
  // 找到3张相同图片的卡
  const cards = document.querySelectorAll(`.cat-card[data-img="${targetImg}"]`);
  if (cards.length < 3) return;
  const rarity = cards[0].dataset.rarity;
  const to = rarity === 'common' ? 'rare' : 'legendary';
  // 移除3张
  for (let i = 0; i < 3; i++) cards[i].remove();
  // 生成1张高级的
  const cat = await generateCat(to);
  addCatCard(cat);
  // 粒子特效
  spawnParticles(to, cards[0].getBoundingClientRect());
  btn.disabled = true;
  btn.textContent = '暂无可合成的猫';
  markDuplicates();
  updateStats();
}

function showLegend(cat) {
  const msg = document.getElementById('legendMsg');
  const emoji = document.getElementById('legendEmoji');
  if (cat.isReal) {
    emoji.innerHTML = `<img src="${cat.imgUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:50%;border:3px solid rgba(255,215,0,.3);display:inline-block">`;
  } else {
    emoji.innerHTML = `<span style="font-size:4rem">${cat.face}</span>`;
  }
  document.getElementById('legendText').textContent = `✨ 传说级猫猫降临！ ${cat.name} ✨`;
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 3000);
}

// 开局送三只
window.addEventListener('DOMContentLoaded', async () => {
  await spawnCat(); await spawnCat(); await spawnCat();
});
</script>
</body>
</html>
