<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>人生重开 · 模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100svh;
    background: linear-gradient(135deg, #0d0d1a, #1a1a2e, #16213e);
    font-family: system-ui, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    touch-action: manipulation;
  }
  .container {
    text-align: center;
    max-width: 520px;
    width: 100%;
  }
  h1 {
    color: rgba(255,255,255,.8);
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: .2em;
    margin-bottom: .3rem;
  }
  .subtitle {
    color: rgba(255,255,255,.35);
    font-size: .8rem;
    margin-bottom: 2rem;
  }

  .card {
    background: rgba(255,255,255,.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    transition: opacity .4s, transform .4s;
  }

  .avatar-area {
    margin-bottom: .8rem;
    position: relative;
  }
  .avatar {
    font-size: 4.5rem;
    display: block;
    line-height: 1;
    transition: transform .3s;
  }
  .avatar.shake {
    animation: avatarShake .6s;
  }
  @keyframes avatarShake {
    0% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-10deg) scale(1.1); }
    50% { transform: rotate(10deg) scale(1.1); }
    75% { transform: rotate(-5deg) scale(1.05); }
    100% { transform: rotate(0) scale(1); }
  }

  .name {
    font-size: 1.5rem;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    margin-bottom: 2px;
  }
  .title-line {
    color: rgba(255,255,255,.35);
    font-size: .8rem;
    margin-bottom: .6rem;
  }

  .age-display {
    font-size: 2rem;
    font-weight: 300;
    color: rgba(255,215,0,.7);
    letter-spacing: .1em;
    margin-bottom: .8rem;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: .8rem;
  }
  .stat {
    background: rgba(255,255,255,.04);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .stat-label {
    color: rgba(255,255,255,.3);
    font-size: .6rem;
    letter-spacing: .1em;
  }
  .stat-value {
    font-size: 1.2rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .stat-bar {
    height: 3px;
    background: rgba(255,255,255,.06);
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }

  .event-box {
    background: rgba(255,255,255,.03);
    border-radius: 14px;
    padding: 14px;
    margin: .6rem 0 .2rem;
    min-height: 3.6em;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 3px solid rgba(255,255,255,.08);
    transition: border-color .3s;
  }
  .event-box.good { border-left-color: #69db7c; }
  .event-box.bad { border-left-color: #ff6b6b; }
  .event-box.neutral { border-left-color: rgba(255,255,255,.2); }
  .event-box.death { border-left-color: #ffd700; }
  .event-text {
    color: rgba(255,255,255,.6);
    font-size: .85rem;
    line-height: 1.5;
  }
  .event-text .age-tag {
    color: rgba(255,215,0,.5);
    font-size: .7rem;
    margin-right: 6px;
  }
  .event-effects {
    font-size: .7rem;
    margin-top: 6px;
    color: rgba(255,255,255,.35);
  }
  .event-effects .up { color: #69db7c; }
  .event-effects .down { color: #ff6b6b; }

  .timeline {
    display: none;
    max-height: 320px;
    overflow-y: auto;
    text-align: left;
    margin: .8rem 0 .2rem;
    padding-right: 4px;
    scroll-behavior: smooth;
  }
  .timeline.show { display: block; }
  .timeline::-webkit-scrollbar { width: 4px; }
  .timeline::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

  .tl-entry {
    display: flex;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,.03);
    font-size: .78rem;
    line-height: 1.4;
  }
  .tl-age {
    color: rgba(255,215,0,.4);
    min-width: 32px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .tl-text {
    color: rgba(255,255,255,.55);
  }
  .tl-entry.death .tl-text { color: #ffd700; font-weight: 600; }

  .death-summary {
    display: none;
    margin-top: .4rem;
  }
  .death-summary.show { display: block; }
  .death-title {
    font-size: 1.1rem;
    color: #ffd700;
    margin-bottom: 4px;
  }
  .death-age {
    font-size: .8rem;
    color: rgba(255,255,255,.3);
    margin-bottom: .6rem;
  }
  .death-cause {
    font-size: .9rem;
    color: rgba(255,255,255,.5);
    padding: 10px;
    background: rgba(255,215,0,.04);
    border-radius: 12px;
    border: 1px solid rgba(255,215,0,.1);
    margin-bottom: .8rem;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.7);
    padding: 12px 28px;
    border-radius: 30px;
    cursor: pointer;
    font-size: .9rem;
    transition: all .2s;
    touch-action: manipulation;
    font-family: inherit;
  }
  .btn:hover {
    background: rgba(255,200,100,.1);
    border-color: rgba(255,200,100,.2);
    color: #ffd700;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary {
    background: rgba(255,200,100,.1);
    border-color: rgba(255,200,100,.2);
    color: #ffd700;
    font-size: 1rem;
    padding: 12px 40px;
  }
  .btn-primary:hover {
    background: rgba(255,200,100,.18);
    box-shadow: 0 0 40px rgba(255,215,0,.08);
  }
  .btn-next {
    color: #69db7c;
    border-color: rgba(105,219,124,.15);
  }
  .btn-next:hover {
    background: rgba(105,219,124,.1);
    border-color: rgba(105,219,124,.25);
    color: #69db7c;
  }
  .btn-dead { display: none; }
  .btn-home {
    border-color: rgba(255,215,0,.15);
    color: rgba(255,215,0,.6);
    font-size: .8rem;
    padding: 8px 20px;
  }

  .footer {
    color: rgba(255,255,255,.12);
    font-size: .7rem;
    margin-top: 1rem;
  }
  @media (max-width: 480px) {
    .card { padding: 1.2rem; }
    .stats { gap: 6px; }
    .stat { padding: 8px; }
    .stat-value { font-size: 1rem; }
    .avatar { font-size: 3.5rem; }
    .age-display { font-size: 1.5rem; }
  }
</style>

    { text: '老朋友又走了一位，越来越孤单', e: { luck: -8, looks: -2 }, mood: 'bad' },
    { text: '身体一天不如一天了', e: { luck: -10, looks: -5 }, mood: 'bad' },
    { text: '四世同堂，天伦之乐', e: { luck: 15, looks: 3 }, mood: 'good' },
    { text: '回顾这一生，有笑有泪，值了', e: { iq: 5, luck: 5 }, mood: 'neutral' },
    { text: '收到了一封来自老友的信', e: { luck: 8 }, mood: 'good' },
    { text: '状态不错，多吃了一碗饭', e: { luck: 3, looks: 2 }, mood: 'good' },
    { text: '生了一场大病，住进了医院', e: { luck: -15, looks: -5 }, mood: 'bad' },
    { text: '子孙们都回来过年了', e: { luck: 12, looks: 3 }, mood: 'good' },
    { text: '在摇椅上晒太阳，一只猫跳到了腿上', e: { luck: 5, looks: 2 }, mood: 'good' },
    { text: '听力越来越不好，和人说话全靠喊', e: { luck: -3, looks: -4 }, mood: 'bad' },
    { text: '收到了百岁老人津贴', e: { wealth: 5, luck: 5 }, mood: 'good' },
    { text: '让孙子教自己用手机，学完就忘', e: { iq: -3, luck: 2 }, mood: 'neutral' },
    { text: '在养老院交到了新的牌友', e: { luck: 6, looks: 2 }, mood: 'good' },
    { text: '吃到了小时候最爱的味道，泪目了', e: { luck: 8, looks: 2 }, mood: 'good' },
    { text: '牙齿又掉了一颗', e: { looks: -4, luck: -2 }, mood: 'bad' },
    { text: '被推着轮椅在花园里散步', e: { luck: 3, looks: -3 }, mood: 'neutral' },
    { text: '握着老伴的手，说了一辈子的话', e: { luck: 10, looks: 3 }, mood: 'good' },
    { text: '望着窗外的天空，心里很平静', e: { luck: 6 }, mood: 'neutral' },
    { text: '在养老院的相亲角找到了黄昏恋', e: { luck: 10, looks: 3 }, mood: 'good' },
    { text: '跟隔壁床的老头/老太吵架，因为电视音量', e: { luck: -3, looks: -2 }, mood: 'bad' },
    { text: '用老人机给孙子发了条短信，写了一个小时', e: { iq: 2, luck: 3 }, mood: 'neutral' },
    { text: '听说年轻人都在搞AI，自己也研究了一下，没懂', e: { iq: -2, luck: 1 }, mood: 'neutral' },
    { text: '活到这把年纪，什么梗都见过了', e: { iq: 3, luck: 4, looks: 2 }, mood: 'good' },
  ],
};

// 致死事件（低概率触发）
const deathEvents = [
  '遭遇了严重的交通事故，没能挺过来',
  '突发心脏病，抢救无效',
  '在睡梦中安详地离开了人世',
  '得了一场急病，医生也无力回天',
  '出门遇到了意外，永远地离开了',
  '吃花生米噎住了，就这么走了',
  '在睡梦中再也没有醒过来',
  '在自家院子里浇花时倒下了',
  '为了救落水的小孩，用尽了最后的力气',
  '被确诊了绝症，安详地走完了最后一程',
  '在看最喜欢的电视剧时安静地离开了',
  '在生日当天，吃完蛋糕后安详离世',
  '因为医疗事故，永远留在了手术台上',
  '在旅途中突发疾病，客死异乡',
  '被一场突如其来的灾难夺走了生命',
];

// ====== 人生状态 ======
let life = null;
let usedNames = new Set();

// ====== 工具函数 ======
function randomStat() {
  let v = 0;
  for (let i = 0; i < 3; i++) v += Math.random() * 33;
  return Math.round(Math.min(99, Math.max(5, v)));
}

function randomName() {
  const n = lastNames[Math.floor(Math.random()*lastNames.length)]
          + firstNames[Math.floor(Math.random()*firstNames.length)];
  if (usedNames.has(n)) return randomName();
  return n;
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

const genderAvatars = {
  male: {
    baby: ['👶','🍼'],
    child: ['👦','🧒'],
    school: ['👦','🧒'],
    teen: ['👦','🧑'],
    young: ['👨','🧔','🤴'],
    midlife: ['👨','🧔'],
    elderly: ['👴','🧓'],
    old: ['👴','🧓'],
  },
  female: {
    baby: ['👶','🍼'],
    child: ['👧','🧒'],
    school: ['👧','🧒'],
    teen: ['👧','👩'],
    young: ['👩','👸','🧚'],
    midlife: ['👩','🧑'],
    elderly: ['👵','🧓'],
    old: ['👵','🧓'],
  },
};

function getAgeAvatar(age, gender) {
  const g = gender === 'female' ? 'female' : 'male';
  let stage;
  if (age <= 3) stage = 'baby';
  else if (age <= 6) stage = 'child';
  else if (age <= 12) stage = 'school';
  else if (age <= 18) stage = 'teen';
  else if (age <= 30) stage = 'young';
  else if (age <= 50) stage = 'midlife';
  else if (age <= 70) stage = 'elderly';
  else stage = 'old';
  const pool = genderAvatars[g][stage];
  return pool[Math.floor(Math.random() * pool.length)];
}

function getAgeStage(age) {
  if (age <= 3) return 'infant';
  if (age <= 6) return 'child';
  if (age <= 12) return 'school';
  if (age <= 18) return 'teen';
  if (age <= 30) return 'youngAdult';
  if (age <= 50) return 'midlife';
  if (age <= 70) return 'elderly';
  return 'old';
}

function getDeathChance(age, luck) {
  // 基础死亡率随年龄递增
  let chance = 0;
  if (age <= 3) chance = 0.008;  // 婴儿期稍高
  else if (age <= 10) chance = 0.003;
  else if (age <= 20) chance = 0.005; // 青少年意外
  else if (age <= 30) chance = 0.003;
  else if (age <= 50) chance = 0.005;
  else if (age <= 70) chance = 0.02;
  else if (age <= 80) chance = 0.08;
  else if (age <= 90) chance = 0.2;
  else chance = 0.4;

  // 运气差增加死亡率
  if (luck < 10 && age > 30) chance += 0.05;
  if (luck < 5 && age > 40) chance += 0.1;

  return Math.min(chance, 0.8);
}

// ====== 核心逻辑 ======
function pickEvent(age) {
  const stage = getAgeStage(age);
  const pool = eventPools[stage];
  return pool[Math.floor(Math.random() * pool.length)];
}

function applyEffects(effects) {
  if (!life) return;
  const keys = ['iq','wealth','looks','luck'];
  const deltas = {};
  for (const k of keys) {
    let delta = effects[k] || 0;
    // 高属性衰减：超过60效果减半，超过80只剩三成
    if (delta > 0 && life[k] >= 80) delta = Math.round(delta * 0.3);
    else if (delta > 0 && life[k] >= 60) delta = Math.round(delta * 0.6);
    // 属性过低时负面效果减半（保护）
    if (delta < 0 && life[k] <= 10) delta = Math.round(delta * 0.4);
    life[k] = clamp(life[k] + delta, 0, 100);
    deltas[k] = delta;
  }
  return deltas;
}

function die(cause) {
  if (!life || !life.alive) return;
  life.alive = false;

  // 加死亡事件到时间线
  life.events.push({ age: life.age, text: cause, isDeath: true });

  // 更新 UI
  document.getElementById('avatar').textContent = '💀';
  document.getElementById('ageDisplay').textContent = `享年 ${life.age} 岁`;
  document.getElementById('eventBox').className = 'event-box death';
  document.getElementById('eventText').innerHTML = `<span class="age-tag">${life.age}岁</span>${cause}`;

  // 显示时间线
  renderTimeline();

  // 显示死亡总结
  document.getElementById('deathSummary').classList.add('show');
  document.getElementById('deathAge').textContent = `终年 ${life.age} 岁`;
  document.getElementById('deathCause').textContent = `💀 ${cause}`;

  // 按钮切换
  document.getElementById('btnNext').classList.remove('btn-dead');
  document.getElementById('btnNext').classList.add('btn-dead');
  document.getElementById('btnHome').classList.remove('btn-dead');

  // 更新总寿命统计
  document.getElementById('lives').textContent = parseInt(document.getElementById('lives').textContent) + 1;
}

function renderEvent(entry) {
  const box = document.getElementById('eventBox');
  const text = document.getElementById('eventText');
  box.className = 'event-box ' + (entry.mood || 'neutral');
  text.innerHTML = `<span class="age-tag">${entry.age}岁</span>${entry.text}`;

  // 如果有属性变化且非死亡事件，显示效果
  if (entry.deltas && !entry.isDeath) {
    const parts = [];
    for (const [k, v] of Object.entries(entry.deltas)) {
      if (v === 0) continue;
      const labels = { iq: '🧠智商', wealth: '💰财运', looks: '❤️颜值', luck: '🍀运气' };
      const cls = v > 0 ? 'up' : 'down';
      const sign = v > 0 ? '+' : '';
      parts.push(`<span class="${cls}">${labels[k]} ${sign}${v}</span>`);
    }
    if (parts.length) {
      text.innerHTML += `<div class="event-effects">${parts.join(' · ')}</div>`;
    }
  }
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  for (const entry of life.events) {
    const div = document.createElement('div');
    div.className = 'tl-entry' + (entry.isDeath ? ' death' : '');
    div.innerHTML = `<span class="tl-age">${entry.age}岁</span><span class="tl-text">${entry.text}</span>`;
    tl.appendChild(div);
  }
  tl.classList.add('show');
  // 滚到底
  setTimeout(() => { tl.scrollTop = tl.scrollHeight; }, 50);
}

function setStat(id, val) {
  document.getElementById(id).textContent = val;
  const bar = document.getElementById(id + 'Bar');
  bar.style.width = val + '%';
  const idx = Math.min(4, Math.floor(val / 20));
  bar.style.background = statColors[idx];
}

function updateStatsUI() {
  if (!life) return;
  setStat('iq', life.iq);
  setStat('wealth', life.wealth);
  setStat('looks', life.looks);
  setStat('luck', life.luck);
}

function updateAgeUI() {
  document.getElementById('ageDisplay').textContent = life.age + ' 岁';
  document.getElementById('avatar').textContent = getAgeAvatar(life.age, life.gender);
}

// ====== 对外接口 ======
function startLife() {
  // 重置
  document.getElementById('eventBox').className = 'event-box';
  document.getElementById('timeline').classList.remove('show');
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('deathSummary').classList.remove('show');
  document.getElementById('btnNext').classList.remove('btn-dead');

  document.getElementById('card').style.opacity = '.5';
  document.getElementById('card').style.transform = 'scale(.97)';

  setTimeout(() => {
    const n = randomName();
    usedNames.add(n);
    if (usedNames.size > 200) usedNames.clear();

    const titles = [
      '的奇妙人生', '的平凡日常', '的起伏人生',
      '的传奇故事', '的摸鱼生涯', '的躺平生活',
      '的逆袭之路', '的佛系人生',
    ];

    const gender = Math.random() < 0.5 ? 'male' : 'female';
    life = {
      name: n,
      gender: gender,
      iq: randomStat(),
      wealth: randomStat(),
      looks: randomStat(),
      luck: randomStat(),
      age: 1,
      alive: true,
      events: [],
    };

    document.getElementById('name').textContent = n;
    document.getElementById('genderBadge').textContent = gender === 'male' ? '♂ 男' : '♀ 女';
    document.getElementById('avatar').textContent = getAgeAvatar(1, gender);
    document.getElementById('titleLine').textContent = `「${n}」${titles[Math.floor(Math.random() * titles.length)]}`;

    updateStatsUI();
    updateAgeUI();

    // 第一年事件
    const evt = pickEvent(1);
    const deltas = applyEffects(evt.e);
    updateStatsUI();

    const entry = { age: 1, text: evt.text, mood: evt.mood, deltas };
    life.events.push(entry);
    renderEvent(entry);

    document.getElementById('card').style.opacity = '1';
    document.getElementById('card').style.transform = 'scale(1)';
  }, 350);
}

function nextYear() {
  if (!life || !life.alive) return;

  life.age++;

  // 死亡判定
  const deathRoll = Math.random();
  const deathChance = getDeathChance(life.age, life.luck);

  if (deathRoll < deathChance) {
    const cause = deathEvents[Math.floor(Math.random() * deathEvents.length)];
    die(cause);
    return;
  }

  // 抽事件
  const evt = pickEvent(life.age);
  const deltas = applyEffects(evt.e);
  updateStatsUI();
  updateAgeUI();

  // 事件致死（早夭/意外）
  if (evt.deathMsg) {
    die(evt.deathMsg);
    return;
  }

  const entry = { age: life.age, text: evt.text, mood: evt.mood, deltas };
  life.events.push(entry);
  renderEvent(entry);

  // 低运气也可能触发死亡（事件中有致死因素）
  if (life.luck <= 0 && life.age > 40) {
    die('运气耗尽，这一生走到了尽头');
    return;
  }

  // 高龄也有小概率自然离世
  if (life.age >= 90 && Math.random() < 0.15) {
    die('在睡梦中安详地离开了人世');
    return;
  }
  if (life.age >= 100) {
    die('长寿百岁，无疾而终');
    return;
  }
}

// ====== 键盘 ======
document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    if (life && life.alive) nextYear();
    else startLife();
  }
  if (e.key === 'r' || e.key === 'R') startLife();
});

// ====== 初始化 ======
document.getElementById('btnNext').classList.add('btn-dead');
</script>
