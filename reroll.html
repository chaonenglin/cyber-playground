<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>人生重开 · 模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100svh;
    background: linear-gradient(135deg, #0d0d1a, #1a1a2e, #16213e);
    font-family: system-ui, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    touch-action: manipulation;
  }
  .container {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  h1 {
    color: rgba(255,255,255,.8);
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: .2em;
    margin-bottom: .3rem;
  }
  .subtitle {
    color: rgba(255,255,255,.35);
    font-size: .8rem;
    margin-bottom: 2rem;
  }

  .card {
    background: rgba(255,255,255,.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .avatar-area {
    margin-bottom: 1.5rem;
    position: relative;
  }
  .avatar {
    font-size: 5rem;
    display: block;
    line-height: 1;
    transition: transform .3s;
  }
  .avatar.shake {
    animation: avatarShake .6s;
  }
  @keyframes avatarShake {
    0% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-10deg) scale(1.1); }
    50% { transform: rotate(10deg) scale(1.1); }
    75% { transform: rotate(-5deg) scale(1.05); }
    100% { transform: rotate(0) scale(1); }
  }

  .name {
    font-size: 1.6rem;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    margin-bottom: 4px;
  }
  .title-line {
    color: rgba(255,255,255,.4);
    font-size: .85rem;
    margin-bottom: 1rem;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .stat {
    background: rgba(255,255,255,.04);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
  }
  .stat-label {
    color: rgba(255,255,255,.3);
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 1.3rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .stat-bar {
    height: 4px;
    background: rgba(255,255,255,.06);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }

  .traits {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .trait {
    font-size: .7rem;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.6);
  }
  .trait.gold { background: rgba(255,215,0,.1); border-color: rgba(255,215,0,.2); color: #ffd700; }
  .trait.red { background: rgba(255,50,50,.08); border-color: rgba(255,50,50,.15); color: #ff6b6b; }

  .bio {
    color: rgba(255,255,255,.5);
    font-size: .85rem;
    line-height: 1.6;
    padding: 1rem 0;
    border-top: 1px solid rgba(255,255,255,.04);
    margin-top: .5rem;
    min-height: 3.2em;
  }

  .btn {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.7);
    padding: 12px 40px;
    border-radius: 30px;
    cursor: pointer;
    font-size: .95rem;
    transition: all .2s;
    touch-action: manipulation;
  }
  .btn:hover {
    background: rgba(255,200,100,.1);
    border-color: rgba(255,200,100,.2);
    color: #ffd700;
  }
  .btn-primary {
    background: rgba(255,200,100,.1);
    border-color: rgba(255,200,100,.2);
    color: #ffd700;
    font-size: 1.1rem;
    padding: 14px 48px;
  }
  .btn-primary:hover {
    background: rgba(255,200,100,.18);
    box-shadow: 0 0 40px rgba(255,215,0,.08);
  }
  .btn:active { transform: scale(.96); }

  .footer { color: rgba(255,255,255,.12); font-size: .7rem; margin-top: 1rem; }
</style>
</head>
<body>

<div class="container">
  <h1>🌀 人生重开模拟器</h1>
  <div class="subtitle">不满意这辈子？再开一局</div>

  <div class="card" id="card">
    <div class="avatar-area">
      <span class="avatar" id="avatar">👶</span>
    </div>
    <div class="name" id="name">加载中...</div>
    <div class="title-line" id="titleLine">——</div>

    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-label">🧠 智商</div>
        <div class="stat-value" id="iq">0</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="iqBar" style="width:0%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">💰 财运</div>
        <div class="stat-value" id="wealth">0</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="wealthBar" style="width:0%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">❤️ 颜值</div>
        <div class="stat-value" id="looks">0</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="looksBar" style="width:0%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">🍀 运气</div>
        <div class="stat-value" id="luck">0</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="luckBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="traits" id="traits"></div>
    <div class="bio" id="bio">点击「重开人生」开始新的一局</div>
  </div>

  <button class="btn btn-primary" onclick="reroll()">🔄 重开人生</button>
  <div class="footer">每次随机生成 · 已经活了 <span id="lives">0</span> 辈子</div>
</div>

<script>
const firstNames = [
  '小明','小红','小刚','阿花','大壮','翠花','狗蛋','铁柱',
  '建国','建军','国庆','跃进','淑芬','丽珍','秀英','志强',
  '子轩','紫萱','浩然','诗涵','沐辰','若曦','星辰','雨桐',
];

const lastNames = [
  '王','李','张','刘','陈','杨','黄','赵','周','吴','徐','孙',
  '马','朱','胡','林','郭','何','高','罗','欧阳','慕容','令狐',
];

const avatars = ['👶','🧒','👦','👧','🧑','👨','👩','🧔','👴','👵',
                 '🤴','👸','🦸','🧙','🧚','🧛','🤖','👽','🎅','🧝'];

const statColors = ['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#63e6be'];

function randomName() {
  return lastNames[Math.floor(Math.random()*lastNames.length)]
       + firstNames[Math.floor(Math.random()*firstNames.length)];
}

function randomStat() {
  // 正态分布近似 (3d6 * 10 ~ 平均50)
  let v = 0;
  for (let i = 0; i < 3; i++) v += Math.random() * 33;
  return Math.round(Math.min(99, Math.max(1, v)));
}

function randomTraits() {
  const pool = [
    { name: '🧠 天才', type: 'gold', min: 80, stat: 'iq' },
    { name: '📖 学霸', type: 'gold', min: 70, stat: 'iq' },
    { name: '💪 强壮', type: 'gold', min: 0 },
    { name: '🎨 艺术细胞', type: 'gold', min: 0 },
    { name: '🎤 唱歌好听', type: 'gold', min: 0 },
    { name: '🏃 跑得快', type: 'gold', min: 0 },
    { name: '💰 富二代', type: 'gold', min: 80, stat: 'wealth' },
    { name: '💎 锦鲤体质', type: 'gold', min: 80, stat: 'luck' },
    { name: '💃 颜值爆表', type: 'gold', min: 80, stat: 'looks' },
    { name: '😅 非酋', type: 'red', max: 20, stat: 'luck' },
    { name: '🤦 手残', type: 'red', max: 0 },
    { name: '🐌 慢吞吞', type: 'red', max: 0 },
    { name: '💸 月光族', type: 'red', max: 30, stat: 'wealth' },
    { name: '😴 嗜睡症', type: 'red', max: 0 },
    { name: '🤧 体弱多病', type: 'red', max: 0 },
    { name: '🧐 选择困难', type: 'red', max: 0 },
    { name: '🐟 摸鱼达人', type: 'gold', min: 0 },
    { name: '🍜 吃货', type: 'gold', min: 0 },
    { name: '😺 吸猫体质', type: 'gold', min: 0 },
    { name: '🔧 动手能力强', type: 'gold', min: 0 },
  ];
  const selected = [];
  const shuffled = pool.sort(() => Math.random() - .5);
  for (const t of shuffled) {
    if (selected.length >= 3) break;
    // Don't add conflicting traits
    if (t.name === '💰 富二代' && selected.some(s => s.name === '💸 月光族')) continue;
    selected.push(t);
  }
  return selected;
}

let usedNames = new Set();

function reroll() {
  const card = document.getElementById('card');
  const avatar = document.getElementById('avatar');
  const name = document.getElementById('name');
  const title = document.getElementById('titleLine');
  const bio = document.getElementById('bio');
  const traits = document.getElementById('traits');
  const lives = document.getElementById('lives');

  // 动画
  avatar.classList.remove('shake');
  void avatar.offsetWidth;
  avatar.classList.add('shake');
  card.style.opacity = '.5';
  card.style.transform = 'scale(.97)';

  setTimeout(() => {
    // 生成数据
    let n;
    do { n = randomName(); } while (usedNames.has(n));
    usedNames.add(n);
    if (usedNames.size > 100) usedNames.clear();
    name.textContent = n;

    avatar.textContent = avatars[Math.floor(Math.random() * avatars.length)];

    const iq = randomStat();
    const wealth = randomStat();
    const looks = randomStat();
    const luck = randomStat();

    setStat('iq', iq);
    setStat('wealth', wealth);
    setStat('looks', looks);
    setStat('luck', luck);

    const traitList = randomTraits();
    traits.innerHTML = traitList.map(t =>
      `<span class="trait ${t.type}">${t.name}</span>`
    ).join('');

    // 人生总结
    const lifeDescs = [
      iq < 20 ? '智商堪忧，但快乐就好' :
      iq > 80 ? '聪明绝顶，头发还剩几根' :
      iq > 60 ? '脑子不错，偶尔短路' : '普通智商，正常发挥',
      wealth < 20 ? '钱包比脸干净' :
      wealth > 80 ? '财富自由，朴实无华' :
      wealth > 60 ? '小有积蓄，偶尔奢侈' : '勉强糊口，够用就行',
      looks < 20 ? '心灵美的典范' :
      looks > 80 ? '靠脸吃饭，排队要签名' :
      looks > 60 ? '五官端正，挺耐看的' : '路人甲乙丙丁',
      luck < 20 ? '喝凉水都塞牙' :
      luck > 80 ? '天选之子，开挂人生' :
      luck > 60 ? '运气不错，偶尔中奖' : '平平淡淡才是真',
    ];

    const titles = [
      '的奇妙人生', '的平凡日常', '的起伏人生',
      '的传奇故事', '的摸鱼生涯', '的躺平生活',
      '的逆袭之路', '的佛系人生',
    ];

    title.textContent = `「${n}」${titles[Math.floor(Math.random() * titles.length)]}`;
    bio.textContent = `🧬 ${lifeDescs[0]} · ${lifeDescs[1]} · ${lifeDescs[2]} · ${lifeDescs[3]}`;

    lives.textContent = parseInt(lives.textContent) + 1;

    card.style.opacity = '1';
    card.style.transform = 'scale(1)';
  }, 400);
}

function setStat(id, val) {
  document.getElementById(id).textContent = val;
  const bar = document.getElementById(id + 'Bar');
  bar.style.width = val + '%';
  const idx = Math.min(4, Math.floor(val / 20));
  bar.style.background = statColors[idx];
}

// 键盘
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); reroll(); }
});

// 开局先来一局
reroll();
</script>
</body>
</html>
